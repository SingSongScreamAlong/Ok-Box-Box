# =====================================================================
# DigitalOcean App Platform Specification
# FULL API MODE - Database, Routes, WebSocket, Everything
# =====================================================================
#
# Deploy with: doctl apps create --spec .do/app.yaml
# Update with: doctl apps update $APP_ID --spec .do/app.yaml

name: controlbox
region: nyc

# =====================================================================
# Services
# =====================================================================
services:
  # =====================================================================
  # API Server (Full Mode - NOT Standalone)
  # =====================================================================
  - name: api
    github:
      repo: SingSongScreamAlong/Ok-Box-Box
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile.server
    http_port: 8080
    instance_size_slug: basic-xxs
    instance_count: 1
    
    # Route rules - which paths this component handles
    routes:
      - path: /api
      - path: /metrics
      - path: /oauth/iracing
    
    # Health check
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 30
    
    # Environment variables
    envs:
      # Runtime
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      
      # Database (from DO managed database)
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      
      # Redis (from DO managed redis or external)
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
      
      # Auth
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
      
      # CORS - Allow app and marketing site origins
      - key: CORS_ORIGINS
        value: "https://app.okboxbox.com,https://okboxbox.com,https://www.okboxbox.com"
      - key: APP_URL
        value: "https://app.okboxbox.com"
      
      # Stripe Billing
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRICE_DRIVER
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRICE_TEAM
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRICE_LEAGUE
        scope: RUN_TIME
        type: SECRET
      
      # iRacing OAuth
      - key: IRACING_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: IRACING_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: IRACING_TOKEN_ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
      
      # OpenAI (for AI debrief + driver analysis)
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ELEVENLABS_API_KEY
        scope: RUN_TIME
        type: SECRET

      # DigitalOcean Spaces (clip + artifact cloud storage)
      - key: DO_SPACES_ENDPOINT
        value: "nyc3.digitaloceanspaces.com"
      - key: DO_SPACES_BUCKET
        value: "controlbox-artifacts"
      - key: DO_SPACES_REGION
        value: "nyc3"
      - key: DO_SPACES_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_SECRET
        scope: RUN_TIME
        type: SECRET

      # FP1 Testing — grants all driver capabilities to free tier
      - key: FP1_TESTING_MODE
        value: "true"

      - key: METRICS_ENABLED
        value: "true"
      - key: OPS_UI_ENABLED
        value: "1"
      
      # Dashboard URL for billing redirects (must be the app, not the marketing site)
      - key: DASHBOARD_URL
        value: "https://app.okboxbox.com"
    
    # Logs and alerts
    log_destinations:
      - name: papertrail
        papertrail:
          endpoint: logs.papertrailapp.com:12345

# =====================================================================
# Static Site (Dashboard)
# =====================================================================
static_sites:
  - name: dashboard
    github:
      repo: SingSongScreamAlong/Ok-Box-Box
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build -w apps/app
    output_dir: apps/app/dist
    index_document: index.html
    error_document: index.html
    
    # Environment for build
    envs:
      - key: VITE_API_URL
        value: "https://app.okboxbox.com"
      - key: VITE_WS_URL
        value: "wss://app.okboxbox.com"
      - key: VITE_SUPABASE_URL
        scope: BUILD_TIME
        type: SECRET
      - key: VITE_SUPABASE_ANON_KEY
        scope: BUILD_TIME
        type: SECRET


# =====================================================================
# Databases
# =====================================================================
databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1
